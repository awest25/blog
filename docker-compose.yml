# Blog runs as its own compose unit on the acquisition VM, mirroring the dashboard.
# Built on the VM from this directory; served on :3001 and proxied by NPM at
# blog.alexanderwest.com. Keystatic GitHub credentials are injected via blog.env.
services:
  blog:
    build:
      context: .
      args:
        # Read from the compose .env file (written by the deploy script). Astro
        # inlines PUBLIC_ vars at build time, so the slug must be a build arg.
        PUBLIC_KEYSTATIC_GITHUB_APP_SLUG: ${PUBLIC_KEYSTATIC_GITHUB_APP_SLUG:-}
    image: farallon-blog:latest
    container_name: blog
    env_file: blog.env
    ports:
      - "3001:3001"
    restart: unless-stopped
